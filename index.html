<body>
    <div class="container">
        <header>
            <h1 class="neon-text">NEON<span>ACC</span></h1>
        </header>

        <main id="main-content">
            <section id="page-transaksi" class="page active">
                <div class="balance-card">
                    <p>Total Saldo</p>
                    <h2 id="total-balance">Rp 0</h2>
                </div>
                <div class="input-section">
                    <input type="text" id="desc" placeholder="Keterangan">
                    <input type="number" id="amount" placeholder="Nominal (Rp)">
                    <select id="type">
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                    </select>
                    <button onclick="addTransaction()" class="neon-btn">Simpan Transaksi</button>
                </div>
                <ul id="transaction-list"></ul>
            </section>

            <section id="page-laporan" class="page">
                <h3 class="neon-text-small">LAPORAN KEUANGAN</h3>
                <div id="report-container">
                    </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button onclick="showPage('transaksi')">📝 Transaksi</button>
            <button onclick="showPage('laporan', 'jurnal')">📖 Jurnal</button>
            <button onclick="showPage('laporan', 'labarugi')">📊 Laba Rugi</button>
            <button onclick="showPage('laporan', 'neraca')">⚖️ Neraca</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
