<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Acc - The Moments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="neon-text">THE MOMENTS <span class="flicker">CIRANJANG</span></h1>
            <p class="subtitle">Accounting Dashboard v1.0</p>
        </header>

        <div class="dashboard-grid">
            <div class="card neon-border-cyan">
                <h3>PENJUALAN PRODUK</h3>
                <p class="amount cyan-glow">Rp 1.342.000</p>
                <span class="status">↑ 12% bulan ini</span>
            </div>

            <div class="card neon-border-pink">
                <h3>TOTAL BEBAN</h3>
                <p class="amount pink-glow">Rp 345.500</p>
                <span class="status">Beban Operasional</span>
            </div>

            <div class="card neon-border-green">
                <h3>LABA BERSIH</h3>
                <p class="amount green-glow">Rp 996.500</p>
                <span class="status">Profit Margin 47.28%</span>
            </div>
        </div>

        <button class="fab-btn">+</button>
    </div>
</body>
</html>
