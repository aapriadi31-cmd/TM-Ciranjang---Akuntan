<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Acc - TM Ciranjang</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header><h1 class="neon-text">NEON<span>ACC</span></h1></header>

        <main id="main-content">
            <section id="page-transaksi" class="page active">
                <div class="balance-card">
                    <p>Total Kas & Bank</p>
                    <h2 id="total-balance">Rp 0</h2>
                </div>
                <div class="input-section">
                    <input type="text" id="desc" placeholder="Keterangan (misal: Isian Buket)">
                    <input type="date" id="transaction-date">
                    <input type="number" id="amount" placeholder="Nominal (Rp)">
                    <select id="type">
                        <option value="income">Pemasukan (Pendapatan)</option>
                        <option value="expense">Pengeluaran (Beban/HPP)</option>
                    </select>
                    <button id="btn-simpan" class="neon-btn">SIMPAN KE CLOUD</button>
                </div>
                <ul id="transaction-list"></ul>
            </section>

            <section id="page-laporan" class="page">
                <h3 class="neon-text-small" id="report-title">LAPORAN</h3>
                <div id="report-container"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button onclick="showPage('transaksi')">📝 Transaksi</button>
            <button onclick="showPage('laporan', 'jurnal')">📖 Jurnal</button>
            <button onclick="showPage('laporan', 'labarugi')">📊 Laba Rugi</button>
            <button onclick="showPage('laporan', 'neraca')">⚖️ Neraca</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", // GANTI INI
            authDomain: "your-project.firebaseapp.com", // GANTI INI
            projectId: "your-project", // GANTI INI
            storageBucket: "your-project.appspot.com", // GANTI INI
            messagingSenderId: "12345...", // GANTI INI
            appId: "1:12345..." // GANTI INI
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Ekspor ke global agar script.js bisa akses
        window.db = db;
        window.fs = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc };
        
        // Load logika aplikasi setelah Firebase siap
        import { initApp } from "./script.js";
        window.initApp = initApp;
        initApp();
    </script>
</body>
</html>
