<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Accounting Cloud</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="neon-text">NEON<span>ACC</span></h1>
        </header>

        <main id="main-content">
            <section id="page-transaksi" class="page active">
                <div class="balance-card">
                    <p>Total Saldo Cloud</p>
                    <h2 id="total-balance">Rp 0</h2>
                </div>
                <div class="input-section">
                    <input type="text" id="desc" placeholder="Keterangan (misal: Isian Buket)">
                    <input type="date" id="transaction-date">
                    <input type="number" id="amount" placeholder="Nominal (Rp)">
                    <select id="type">
                        <option value="income">Pemasukan</option>
                        <option value="expense">Pengeluaran</option>
                    </select>
                    <button id="btn-simpan" class="neon-btn">Simpan ke Cloud</button>
                </div>
                <ul id="transaction-list"></ul>
            </section>

            <section id="page-laporan" class="page">
                <h3 class="neon-text-small" id="report-title">LAPORAN</h3>
                <div id="report-container"></div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button onclick="showPage('transaksi')">📝 Transaksi</button>
            <button onclick="showPage('laporan', 'jurnal')">📖 Jurnal</button>
            <button onclick="showPage('laporan', 'labarugi')">📊 Laba Rugi</button>
            <button onclick="showPage('laporan', 'neraca')">⚖️ Neraca</button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // GANTI DENGAN CONFIG FIREBASE KAMU SENDIRI
        const firebaseConfig = {
            apiKey: "MASUKKAN_API_KEY_KAMU",
            authDomain: "PROYEK-KAMU.firebaseapp.com",
            projectId: "PROYEK-KAMU",
            storageBucket: "PROYEK-KAMU.appspot.com",
            messagingSenderId: "ID-SENDER",
            appId: "ID-APP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.fs = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc };
        
        import { initApp } from "./script.js";
        initApp();
    </script>
</body>
</html>
